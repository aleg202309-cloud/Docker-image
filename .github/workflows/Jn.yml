name: Docker Image Packager (Sneakernet)

on:
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Docker Images
        run: |
          docker pull letta/letta:latest
          docker pull postgres:16-alpine
          docker pull chromadb/chroma:latest
          docker pull ollama/ollama:latest

      - name: Save Images to Tarball
        run: |
          docker save -o amanda_docker_pack.tar \
            letta/letta:latest \
            postgres:16-alpine \
            chromadb/chroma:latest \
            ollama/ollama:latest

      - name: Compress Pack (Gzip)
        # Comprimir es vital porque Ollama es muy pesado
        run: gzip amanda_docker_pack.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amanda-offline-bundle
          path: amanda_docker_pack.tar.gz
          retention-days: 3 # Tiempo que estará disponible para descargar
